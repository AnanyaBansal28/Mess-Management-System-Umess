<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tracking</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',Arial;
margin:0;
background:#f9fafc;
}

/* header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#fff;
border-bottom:1px solid #eee;
}

h2{
color:#4c1d95;
}

.btn-purple{

width:100%;

background:#8b5cf6;
color:white;

padding:10px;

border-radius:8px;
border:none;

cursor:pointer;

font-size:15px;

margin-top:8px;

}
.small-btn{

width:auto;

padding:8px 16px;

display:inline-block;

}
/* popup */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
}

.overlay:target{
display:flex;
}

.popup{
background:white;
padding:25px;
border-radius:12px;
width:350px;
text-align:center;
}

.popup input,
.popup select{

width:100%;

padding:12px;

margin:8px 0;

font-size:15px;

border:1px solid #ccc;
border-radius:8px;

box-sizing:border-box;

}

.students{
margin:20px;
background:white;
padding:20px;
border-radius:10px;
}

.student-card{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #eee;
}

.yes{color:green;}
.no{color:red;}

</style>
</head>


<body>


<header>

<h2>
<i class="fa-solid fa-user-check"></i>
Attendance Tracking
</h2>

<a href="#markAttendance"
class="btn-purple small-btn">
Mark Attendance
</a>

</header>



<div class="students">

<h3>Student Attendance</h3>

<div id="studentList">

</div>

</div>



<!-- popup -->

<div id="markAttendance"
class="overlay">

<div class="popup">

<h3>Mark Attendance</h3>

<input id="rollInput"
placeholder="Student ID">

<select id="mealSelect">

<option value="">
Select Meal
</option>

<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>

</select>

<button class="btn-purple"
onclick="markAttendance()">

Make Present

</button>

<br><br>

<button class="btn-purple" onclick="closePopup()">
Close
</button>

</div>

</div>



<script>
  function closePopup(){

window.location.hash="";

}

async function loadStudents(){

const res =
await fetch(
"/api/attendencetracking"
);

const data =
await res.json();

const list =
document.getElementById(
"studentList"
);

list.innerHTML="";


data.forEach(s=>{

let meals="";

meals += s.breakfast
? "<span class='yes'>B</span>"
: "<span class='no'>B</span>";

meals += s.lunch
? "<span class='yes'> L</span>"
: "<span class='no'> L</span>";

meals += s.dinner
? "<span class='yes'> D</span>"
: "<span class='no'> D</span>";

const div =
document.createElement("div");

div.className="student-card";

div.innerHTML=`

<div>

<strong>${s.name}</strong>

<br>

${s.roll}

</div>

<div>

${meals}

</div>

`;

list.appendChild(div);

});

}



async function markAttendance(){

const roll =
document.getElementById(
"rollInput"
).value.trim();

const meal =
document.getElementById(
"mealSelect"
).value.trim();


if(!roll || !meal){

alert("Fill all");

return;

}


await fetch(
"/api/attendencetracking",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:
JSON.stringify({
roll,
meal
})
}
);

alert("Saved");

loadStudents();

document.getElementById("rollInput").value="";
document.getElementById("mealSelect").value="";

}


loadStudents();

</script>


</body>
</html>
