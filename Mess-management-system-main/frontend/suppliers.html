<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f8f9fa;
margin:0;
padding:0;
color:#333;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#fff;
border-bottom:1px solid #eee;
}

header h1{
font-size:20px;
display:flex;
align-items:center;
gap:10px;
margin:0;
}

header h1 i{
color:green;
font-size:22px;
}

header button{
background:green;
color:#fff;
border:none;
padding:10px 18px;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.container{
max-width:1100px;
margin:20px auto;
padding:0 20px;
}

/* Summary cards */

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
display:flex;
align-items:center;
justify-content:space-between;
}

.card i{
font-size:22px;
padding:12px;
border-radius:50%;
}

.blue{
background:#eaf1ff;
color:#4a6cf7;
}

.yellow{
background:#fff6d8;
color:#f1b200;
}

.green{
background:#e6f9ee;
color:#1e9b4f;
}

.purple{
background:#f0eaff;
color:#7b4df7;
}

.card-text h2{
margin:0;
font-size:22px;
font-weight:bold;
}

.card-text p{
margin:5px 0 0;
color:#555;
font-size:14px;
}

/* Tabs */

.tabs{
display:flex;
justify-content:space-around;
margin:20px auto;
background:#fff;
width:100%;
max-width:1050px;
padding:10px 20px;
border-radius:25px;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
flex-wrap:wrap;
gap:20px;
}

.tabs a{
text-decoration:none;
color:#111;
font-weight:500;
font-size:14px;
display:flex;
align-items:center;
gap:6px;
}

/* Supplier card */

.supplier-card{
background:#fff;
border-radius:15px;
padding:20px 25px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:flex-start;
}

.supplier-info h2{
margin:0;
font-size:18px;
font-weight:bold;
color:#333;
}

.supplier-info p{
margin:6px 0;
font-size:14px;
color:#555;
display:flex;
align-items:center;
gap:8px;
}

.supplier-info i{
color:#c2185b;
font-size:15px;
}

.supplier-info .fa-envelope{
color:#673ab7;
}

.supplier-info .fa-star{
color:#f4b400;
}

.supplies{
text-align:right;
}

.supplies h3{
margin:0 0 10px;
font-size:15px;
color:#444;
}

.tags{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:flex-end;
}

.tag{
background:#f5f5f5;
padding:6px 12px;
border-radius:20px;
font-size:13px;
color:#333;
border:1px solid #e0e0e0;
}

</style>
</head>

<body>

<header>

<h1>
<i class="fa-solid fa-box"></i>
Inventory Control
</h1>

<button>
<i class="fa-solid fa-plus"></i>
Add Item
</button>

</header>

<div class="container">

<!-- Summary -->

<div class="summary">

<div class="card">
<div class="card-text">
<p>Total Items</p>
<h2 style="color:#4a6cf7;">4</h2>
</div>
<i class="fa-solid fa-box blue"></i>
</div>

<div class="card">
<div class="card-text">
<p>Low Stock Items</p>
<h2 style="color:#e1a910">2</h2>
</div>
<i class="fa-solid fa-triangle-exclamation yellow"></i>
</div>

<div class="card">
<div class="card-text">
<p>Total Value</p>
<h2 style="color:#1e9b4f">₹44,300</h2>
</div>
<i class="fa-solid fa-arrow-trend-up green"></i>
</div>

<div class="card">
<div class="card-text">
<p>Stock Level</p>
<h2 style="color:#7b4df7">85%</h2>
</div>
<i class="fa-solid fa-circle-check purple"></i>
</div>

</div>

<!-- Tabs -->

<div class="tabs">

<a href="inventory.html">
<i class="fa-solid fa-cubes"></i>
Inventory Items
</a>

<a href="suppliers.html">
<i class="fa-solid fa-truck"></i>
Suppliers
</a>

</div>

<!-- MongoDB suppliers render here -->

<div id="supplierList"></div>

</div>

<script>

async function loadSuppliers(){

const res =
await fetch("/api/suppliers");

const data =
await res.json();

const container =
document.getElementById("supplierList");

container.innerHTML="";

data.forEach(s=>{

let supplyTags="";

s.supplies.forEach(item=>{

supplyTags += `
<span class="tag">${item}</span>
`;

});

container.innerHTML += `

<div class="supplier-card">

<div class="supplier-info">

<h2>${s.name}</h2>

<p>
<i class="fa-solid fa-phone"></i>
${s.phone}
</p>

<p>
<i class="fa-solid fa-envelope"></i>
${s.email}
</p>

<p>
<i class="fa-solid fa-star"></i>
${s.rating}/5.0
</p>

</div>

<div class="supplies">

<h3>Supplies</h3>

<div class="tags">

${supplyTags}

</div>

</div>

</div>

`;

});

}

loadSuppliers();

</script>

</body>
</html>
