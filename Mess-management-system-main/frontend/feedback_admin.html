<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feedback System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
color:#333;
}

header{
background:#fff;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:10;
}

header h2{
margin:0;
font-size:20px;
display:flex;
align-items:center;
gap:8px;
color:#444;
}

.feedback{
background:#fff;
padding:16px;
margin:25px 100px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.tags span{
background:#eef2ff;
color:#444;
font-size:11px;
padding:2px 6px;
border-radius:5px;
margin-left:4px;
}

.stars{
color:gold;
font-size:14px;
}

.buttons{
margin-top:10px;
}

.buttons button{
padding:8px 12px;
border-radius:6px;
border:1px solid #ccc;
margin-right:8px;
cursor:pointer;
font-size:12px;
}

.reviewBtn{
background:#f0fff4;
}

.replyBtn{
background:#eef2ff;
}

.admin-response{
margin-top:10px;
background:#eaf3ff;
padding:10px;
border-radius:6px;
font-size:13px;
}

.empty{
text-align:center;
margin-top:50px;
font-size:18px;
color:#888;
}

</style>
</head>

<body>

<header>

<div style="display:flex; align-items:center; gap:10px;">

<a href="admin_dashboard.html"
style="text-decoration:none; font-size:18px;">

<i class="fa-solid fa-arrow-left"></i>

</a>

<h2>
<i class="fa-solid fa-message"
style="color:blue;"></i>

Feedback System
</h2>

</div>

</header>


<div id="feedbackList"></div>


<script>

async function loadFeedback(){

try{

const res =
await fetch("/api/feedback");

const data =
await res.json();

const list =
document.getElementById(
"feedbackList"
);

list.innerHTML = "";



if(data.length === 0){

list.innerHTML = `

<div class="empty">
No feedback available
</div>

`;

return;

}



data.forEach(f => {

let stars = "";



for(let i=0; i<f.rating; i++){

stars += "★";

}



const div =
document.createElement("div");



div.className = "feedback";



div.innerHTML = `

<strong>
${f.name || "Student"}
</strong>

<span class="tags">
<span>
${f.status || "NEW"}
</span>
</span>

<p>
${f.date || ""}
</p>

<p>
<span class="stars">
${stars}
</span>
</p>

<p>
${f.comment}
</p>

<div class="buttons">

<button class="reviewBtn"
onclick="review('${f._id}')">

<i class="fa-solid fa-check"></i>
Mark Reviewed

</button>

<button class="replyBtn"
onclick="reply('${f._id}')">

<i class="fa-solid fa-reply"></i>
Respond

</button>

</div>

${f.response ?

`

<div class="admin-response">

<b>Admin Response:</b>
${f.response}

</div>

`

: ""}

`;



list.appendChild(div);

});



}catch(err){

document.getElementById(
"feedbackList"
).innerHTML = `

<div class="empty">
Error loading feedback
</div>

`;

}

}



async function review(id){

try{

await fetch("/api/feedback",{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

id:id,

status:"REVIEWED"

})

});



loadFeedback();



}catch(err){

alert("Error updating feedback");

}

}



async function reply(id){

const r =
prompt(
"Enter response"
);



if(!r) return;



try{

await fetch("/api/feedback",{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

id:id,

status:"RESPONDED",

response:r

})

});



loadFeedback();



}catch(err){

alert("Error sending response");

}

}



loadFeedback();

</script>
</body>
</html>
