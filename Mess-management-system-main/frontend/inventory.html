<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Control</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f8f9fa;
margin:0;
padding:0;
color:#333;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#fff;
border-bottom:1px solid #eee;
}

header h1{
font-size:20px;
display:flex;
align-items:center;
gap:10px;
margin:0;
}

header h1 i{
color:green;
font-size:22px;
}

header button{
background:green;
color:#fff;
border:none;
padding:10px 18px;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.container{
max-width:1100px;
margin:20px auto;
padding:0 20px;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
display:flex;
align-items:center;
justify-content:space-between;
}

.card i{
font-size:22px;
padding:12px;
border-radius:50%;
}

.blue{background:#eaf1ff;color:#4a6cf7;}
.yellow{background:#fff6d8;color:#f1b200;}
.green{background:#e6f9ee;color:#1e9b4f;}
.purple{background:#f0eaff;color:#7b4df7;}

.tabs{
display:flex;
justify-content:space-around;
margin:20px auto;
background:#fff;
width:100%;
max-width:1050px;
padding:10px 20px;
border-radius:25px;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.tabs a{
text-decoration:none;
color:#111;
font-weight:500;
font-size:14px;
display:flex;
align-items:center;
gap:6px;
}

.filter{
margin:10px 0 20px;
}

.filter select{
padding:8px 12px;
border-radius:6px;
border:1px solid #ddd;
}

.inventory-list{
margin:0 30px 40px 30px;
}

.item{
background:#fff;
border-radius:10px;
margin-bottom:15px;
padding:20px;
display:flex;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
gap:20px;
}

.item-name{
min-width:150px;
}

.item-category{
font-size:13px;
color:#666;
display:block;
margin-top:4px;
}

.item-status{
font-size:12px;
padding:3px 8px;
border-radius:10px;
margin-left:8px;
}

.good{
background:#e6ffed;
color:#1e8e3e;
}

.critical{
background:#ffe6e6;
color:#d93025;
}

.progress{
flex:1;
height:10px;
background:#eee;
border-radius:5px;
}

.progress-bar{
height:10px;
background:#000;
border-radius:5px;
}

.item-stock,.item-value{
text-align:right;
min-width:100px;
}

.stock-input{
padding:8px;
width:80px;
border:1px solid #ccc;
border-radius:6px;
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-box{
background:white;
width:500px;
padding:25px;
border-radius:16px;
}

.modal-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.modal-head span{
font-size:24px;
cursor:pointer;
}

.modal-box input,
.modal-box select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:15px;
box-sizing:border-box;
}

.row{
display:flex;
gap:15px;
}

.save-btn{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>
<i class="fa-solid fa-box"></i>
Inventory Control
</h1>

<button onclick="openModal()">
<i class="fa-solid fa-plus"></i>
Add Item
</button>
</header>

<div class="container">

<div class="summary">

<div class="card">
<div>
<p>Total Items</p>
<h2 id="totalItems">0</h2>
</div>
<i class="fa-solid fa-box blue"></i>
</div>

<div class="card">
<div>
<p>Low Stock Items</p>
<h2 id="lowStock">0</h2>
</div>
<i class="fa-solid fa-triangle-exclamation yellow"></i>
</div>

<div class="card">
<div>
<p>Total Value</p>
<h2 id="totalValue">₹0</h2>
</div>
<i class="fa-solid fa-arrow-trend-up green"></i>
</div>

<div class="card">
<div>
<p>Stock Level</p>
<h2 id="stockLevel">0%</h2>
</div>
<i class="fa-solid fa-circle-check purple"></i>
</div>

</div>

<div class="tabs">

<a href="inventory.html">
<i class="fa-solid fa-cubes"></i>
Inventory Items
</a>

<a href="suppliers.html">
<i class="fa-solid fa-truck"></i>
Suppliers
</a>

</div>

<div class="filter">
<select>
<option>All Categories</option>
<option>Grains</option>
<option>Vegetables</option>
<option>Dairy</option>
<option>Spices</option>
</select>
</div>

<section class="inventory-list">
</section>

</div>


<!-- modal -->

<div id="itemModal" class="modal">

<div class="modal-box">

<div class="modal-head">
<h2>Add Inventory Item</h2>
<span onclick="closeModal()">×</span>
</div>

<input id="itemName" type="text" placeholder="Enter item name">

<div class="row">
<select id="itemCategory">
<option>Grains</option>
<option>Vegetables</option>
<option>Dairy</option>
<option>Spices</option>
</select>

<input id="itemStock" type="number" placeholder="Stock">
</div>

<div class="row">
<input id="itemPrice" type="number" placeholder="Price">
</div>

<button class="save-btn" onclick="addItem()">
Add Item
</button>

</div>

</div>


<script>

function openModal(){
document.getElementById(
"itemModal"
).style.display="flex";
}

function closeModal(){
document.getElementById(
"itemModal"
).style.display="none";
}


async function loadInventory(){

const res =
await fetch("/api/inventory");

const data =
await res.json();

const list =
document.querySelector(".inventory-list");

list.innerHTML="";

let totalValue=0;
let lowStock=0;

data.forEach(item=>{

const percent =
Math.min((item.stock/500)*100,100);

const status =
item.stock<50
? "critical"
: "good";

if(item.stock<50){
lowStock++;
}

totalValue +=
item.stock*item.price;

const div =
document.createElement("div");

div.className="item";

div.innerHTML=`

<div class="item-name">

<strong>${item.name}</strong>

<span class="item-status ${status}">
${status.toUpperCase()}
</span>

<span class="item-category">
${item.category}
</span>

</div>

<div class="progress">
<div class="progress-bar"
style="width:${percent}%">
</div>
</div>

<div class="item-stock">
Current Stock<br>
<b>${item.stock}</b>
</div>

<div class="item-value">
Value<br>
<b>₹${item.stock*item.price}</b>
</div>

<div>
<input
class="stock-input"
type="number"
value="${item.stock}"
onchange="updateStock(
'${item.name}',
this.value
)">
</div>

`;

list.appendChild(div);

});

document.getElementById(
"totalItems"
).innerText=data.length;

document.getElementById(
"lowStock"
).innerText=lowStock;

document.getElementById(
"totalValue"
).innerText="₹"+totalValue;

document.getElementById(
"stockLevel"
).innerText=
data.length>0
? Math.round(
((data.length-lowStock)/data.length)*100
)+"%"
: "0%";

}


async function updateStock(name,stock){

await fetch(
"/api/inventory",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:
JSON.stringify({
name,
stock:Number(stock)
})
}
);

loadInventory();

}


async function addItem(){

const name =
document.getElementById(
"itemName"
).value;

const category =
document.getElementById(
"itemCategory"
).value;

const stock =
document.getElementById(
"itemStock"
).value;

const price =
document.getElementById(
"itemPrice"
).value;

await fetch(
"/api/inventory/add",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:
JSON.stringify({
name,
category,
stock:Number(stock),
price:Number(price)
})
}
);

closeModal();

loadInventory();

}

loadInventory();

</script>

</body>
</html>
